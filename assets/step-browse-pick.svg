<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <!-- Background -->
  <rect width="280" height="180" fill="#0A0A0A" rx="10"/>

  <!-- Card 1 - Colors tab, active -->
  <rect x="20" y="20" width="74" height="90" rx="8" fill="#111" stroke="#4061E7" stroke-width="1.5"/>
  <rect x="20" y="20" width="74" height="52" rx="8" fill="#4061E7"/>
  <rect x="20" y="60" width="74" height="12" fill="#4061E7"/>
  <text x="32" y="83" font-family="sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">Primary Blue</text>
  <text x="32" y="96" font-family="sans-serif" font-size="7" fill="#767676">#4061E7</text>

  <!-- Card 2 - Gradient -->
  <rect x="103" y="20" width="74" height="90" rx="8" fill="#111" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="103" y="20" width="74" height="52" rx="8" fill="url(#g1)"/>
  <rect x="103" y="60" width="74" height="12" fill="url(#g1)"/>
  <text x="115" y="83" font-family="sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">Indigo Depth</text>
  <text x="115" y="96" font-family="sans-serif" font-size="7" fill="#767676">linear-gradient</text>

  <!-- Card 3 - Typography -->
  <rect x="186" y="20" width="74" height="90" rx="8" fill="#111" stroke="#2A2A2A" stroke-width="1.5"/>
  <text x="223" y="58" font-family="serif" font-size="26" fill="#FFFFFF" text-anchor="middle" font-weight="700">Aa</text>
  <text x="198" y="83" font-family="sans-serif" font-size="8" fill="#FFFFFF" font-weight="700">Title Large</text>
  <text x="198" y="96" font-family="sans-serif" font-size="7" fill="#767676">40px / 700</text>

  <!-- Tab bar -->
  <rect x="20" y="126" width="240" height="34" rx="8" fill="#111" stroke="#1E1E1E" stroke-width="1"/>
  <rect x="24" y="130" width="56" height="26" rx="6" fill="#4061E7"/>
  <text x="52" y="147" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="600">Colors</text>
  <text x="117" y="147" font-family="sans-serif" font-size="9" fill="#767676" text-anchor="middle">Gradients</text>
  <text x="185" y="147" font-family="sans-serif" font-size="9" fill="#767676" text-anchor="middle">Typography</text>
  <text x="243" y="147" font-family="sans-serif" font-size="9" fill="#767676" text-anchor="middle">FAQ</text>

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4061E7"/>
      <stop offset="100%" stop-color="#192247"/>
    </linearGradient>
  </defs>
</svg>
