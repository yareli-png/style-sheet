<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <!-- Background -->
  <rect width="280" height="180" fill="#0A0A0A" rx="10"/>

  <!-- Main card - hovered state -->
  <rect x="60" y="24" width="160" height="100" rx="10" fill="#111" stroke="#4061E7" stroke-width="1.5"/>

  <!-- Color swatch area -->
  <rect x="60" y="24" width="160" height="62" rx="10" fill="#4061E7"/>
  <rect x="60" y="70" width="160" height="16" fill="#4061E7"/>

  <!-- Copy icon button - visible (hover state) -->
  <rect x="194" y="30" width="22" height="22" rx="5" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Copy icon paths -->
  <rect x="199" y="35" width="9" height="10" rx="1.5" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="201.5" y="33" width="9" height="10" rx="1.5" fill="#000" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- Meta bar -->
  <text x="74" y="103" font-family="sans-serif" font-size="9" fill="#FFFFFF" font-weight="700">Primary Blue</text>
  <text x="74" y="116" font-family="sans-serif" font-size="8" fill="#767676">#4061E7</text>
  <text x="190" y="116" font-family="sans-serif" font-size="8" fill="#767676" text-anchor="end">Brand · UI</text>

  <!-- Tooltip -->
  <rect x="84" y="136" width="86" height="24" rx="5" fill="#4061E7"/>
  <polygon points="127,131 122,136 132,136" fill="#4061E7"/>
  <text x="127" y="152" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="600">Copied!</text>
</svg>
