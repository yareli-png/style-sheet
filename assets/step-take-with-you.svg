<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <!-- Background -->
  <rect width="280" height="180" fill="#0A0A0A" rx="10"/>

  <!-- Pinned cards at top (faded) -->
  <rect x="20" y="16" width="54" height="66" rx="8" fill="#111" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="20" y="16" width="54" height="38" rx="8" fill="#4061E7"/>
  <rect x="20" y="46" width="54" height="8" fill="#4061E7"/>
  <text x="27" y="65" font-family="sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">Primary</text>

  <rect x="82" y="16" width="54" height="66" rx="8" fill="#111" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="82" y="16" width="54" height="38" rx="8" fill="#6D3BE3"/>
  <rect x="82" y="46" width="54" height="8" fill="#6D3BE3"/>
  <text x="89" y="65" font-family="sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">Accent</text>

  <rect x="144" y="16" width="54" height="66" rx="8" fill="#111" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="144" y="16" width="54" height="38" rx="8" fill="#192247"/>
  <rect x="144" y="46" width="54" height="8" fill="#192247"/>
  <text x="151" y="65" font-family="sans-serif" font-size="7" fill="#FFFFFF" font-weight="700">Deep</text>

  <!-- Pin bar -->
  <rect x="10" y="100" width="260" height="68" rx="10" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Pinned chips -->
  <rect x="20" y="112" width="44" height="22" rx="11" fill="#4061E7"/>
  <text x="42" y="127" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">#4061E7</text>

  <rect x="70" y="112" width="44" height="22" rx="11" fill="#6D3BE3"/>
  <text x="92" y="127" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">#6D3BE3</text>

  <rect x="120" y="112" width="44" height="22" rx="11" fill="#192247"/>
  <text x="142" y="127" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">#192247</text>

  <!-- Buttons -->
  <rect x="176" y="110" width="70" height="26" rx="6" fill="#4061E7"/>
  <text x="211" y="127" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="600">Copy CSS</text>

  <rect x="20" y="142" width="226" height="18" rx="4" fill="#111" stroke="#2A2A2A" stroke-width="1"/>
  <text x="43" y="155" font-family="monospace" font-size="7" fill="#767676">--color-primary: #4061E7; --color-accent: #6D3BE3; ...</text>
</svg>
