<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <!-- Background -->
  <rect width="280" height="180" fill="#0A0A0A" rx="10"/>

  <!-- Mode label -->
  <text x="28" y="46" font-family="sans-serif" font-size="9" fill="#767676" letter-spacing="1">MODE</text>
  <!-- Mode pill group -->
  <rect x="28" y="54" width="100" height="30" rx="15" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Dark active pill -->
  <rect x="30" y="56" width="46" height="26" rx="13" fill="#2A2A2A"/>
  <text x="53" y="73" font-family="sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">Dark</text>
  <text x="101" y="73" font-family="sans-serif" font-size="11" fill="#555" text-anchor="middle">Light</text>

  <!-- Scheme label -->
  <text x="28" y="106" font-family="sans-serif" font-size="9" fill="#767676" letter-spacing="1">SCHEME</text>
  <!-- Scheme pill group -->
  <rect x="28" y="114" width="156" height="30" rx="15" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Cool active pill -->
  <rect x="82" y="116" width="50" height="26" rx="13" fill="#4061E7"/>
  <text x="57" y="133" font-family="sans-serif" font-size="11" fill="#555" text-anchor="middle">Core</text>
  <text x="107" y="133" font-family="sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">Cool</text>
  <text x="157" y="133" font-family="sans-serif" font-size="11" fill="#555" text-anchor="middle">Warm</text>

  <!-- Decorative swatch dots -->
  <circle cx="210" cy="72" r="18" fill="#4061E7"/>
  <circle cx="244" cy="72" r="18" fill="#6D3BE3"/>
  <circle cx="210" cy="110" r="18" fill="#192247"/>
  <circle cx="244" cy="110" r="18" fill="#2A3FA0"/>
</svg>
