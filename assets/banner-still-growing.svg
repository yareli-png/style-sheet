<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1E5F5"/>
      <stop offset="100%" stop-color="#A9B9FA"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4061E7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6D3BE3" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="orb2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D3BE3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4061E7" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="180" fill="url(#bg)" rx="10"/>

  <!-- Decorative orbs -->
  <circle cx="230" cy="40" r="70" fill="url(#orb1)"/>
  <circle cx="50" cy="150" r="60" fill="url(#orb2)"/>

  <!-- Floating dots — growing pattern -->
  <circle cx="60" cy="60" r="4" fill="#4061E7" opacity="0.4"/>
  <circle cx="84" cy="44" r="6" fill="#4061E7" opacity="0.55"/>
  <circle cx="112" cy="32" r="8" fill="#4061E7" opacity="0.65"/>
  <circle cx="144" cy="24" r="10" fill="#4061E7" opacity="0.75"/>
  <circle cx="180" cy="30" r="8" fill="#6D3BE3" opacity="0.65"/>
  <circle cx="210" cy="44" r="6" fill="#6D3BE3" opacity="0.5"/>

  <!-- Connecting line -->
  <path d="M60 60 Q84 44 112 32 Q144 24 180 30 Q210 44 230 55" stroke="#4061E7" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Small accent dots -->
  <circle cx="100" cy="100" r="3" fill="#4061E7" opacity="0.3"/>
  <circle cx="160" cy="120" r="3" fill="#6D3BE3" opacity="0.3"/>
  <circle cx="200" cy="90" r="2.5" fill="#4061E7" opacity="0.25"/>
  <circle cx="70" cy="130" r="2.5" fill="#6D3BE3" opacity="0.25"/>
  <circle cx="240" cy="130" r="4" fill="#4061E7" opacity="0.2"/>
</svg>
